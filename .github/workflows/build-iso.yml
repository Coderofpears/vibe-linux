name: Build ISO Images

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ISO (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
      fail-fast: false
    container:
      image: archlinux:latest
      options: --privileged
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Install dependencies
        run: |
          echo "Updating package database..."
          pacman -Sy --noconfirm
          
          echo "Installing archiso and build tools..."
          pacman -S --noconfirm archiso archinstall python python-psutil bubblewrap git rsync curl base-devel
          
          echo "Dependencies installed:"
          pacman -Q archiso archinstall python rsync git
      
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup build environment
        run: |
          chmod +x scripts/build-iso-arch.sh
          echo "Build script permissions:"
          ls -la scripts/build-iso-arch.sh
          
          echo "Current user and ID:"
          whoami
          id
          
          echo "Checking PATH:"
          echo "$PATH"
      
      - name: Verify build dependencies
        run: |
          echo "=== Dependency Check ==="
          
          echo "Checking mkarchiso..."
          if command -v mkarchiso >/dev/null 2>&1; then
            echo "✓ mkarchiso found at $(which mkarchiso)"
            mkarchiso --version
          else
            echo "✗ mkarchiso not found in PATH"
            find /usr -name "mkarchiso" 2>/dev/null || true
            exit 1
          fi
          
          echo ""
          echo "Checking rsync..."
          which rsync || exit 1
          
          echo ""
          echo "Checking bash..."
          bash --version | head -1
          
          echo ""
          echo "Disk space available:"
          df -h / /tmp || true
      
      - name: Build ISO for ${{ matrix.arch }}
        run: |
          set -x
          echo "Starting ISO build for ${{ matrix.arch }}"
          bash -n scripts/build-iso-arch.sh  # Syntax check first
          bash scripts/build-iso-arch.sh ${{ matrix.arch }}
          set +x
      
      - name: Generate checksums
        run: |
          if [ -d out ] && [ -n "$(ls -A out/*.iso 2>/dev/null)" ]; then
            cd out
            sha256sum *.iso > SHA256SUMS
            ls -lh
          else
            echo "Warning: No ISOs found in out/ directory"
            mkdir -p out
          fi
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vibe-linux-${{ matrix.arch }}
          path: out/
          retention-days: 90
  
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: build-artifacts
      
      - name: Organize release files
        run: |
          mkdir -p release-files
          find build-artifacts -name "*.iso" -exec cp {} release-files/ \;
          find build-artifacts -name "SHA256SUMS" -exec cp {} release-files/ \;
          ls -lh release-files/
      
      - name: Create Release Notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "# Vibe-Linux ${VERSION}" > release-notes.md
          echo "" >> release-notes.md
          echo "## Release Information" >> release-notes.md
          echo "Built from commit: \`$(git rev-parse --short HEAD)\`" >> release-notes.md
          echo "Date: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> release-notes.md
          echo "" >> release-notes.md
          echo "## Downloads" >> release-notes.md
          echo "Both x86_64 and ARM64 (aarch64) architectures are supported." >> release-notes.md
          echo "" >> release-notes.md
          echo "### Installation" >> release-notes.md
          echo "1. Download the ISO file for your architecture" >> release-notes.md
          echo "2. Verify the SHA256 checksum" >> release-notes.md
          echo "3. Flash to USB using Etcher, Ventoy, or \`dd\`" >> release-notes.md
          echo "4. Boot and run the guided installer" >> release-notes.md
          echo "" >> release-notes.md
          echo "## Features" >> release-notes.md
          echo "- KDE Plasma desktop with multiple UI presets (Default, Windows 11, macOS)" >> release-notes.md
          echo "- Arch Linux rolling base with pacman package management" >> release-notes.md
          echo "- Secure plugin runtime with sandboxing" >> release-notes.md
          echo "- Multi-architecture support (x86_64 and ARM64)" >> release-notes.md
          echo "- Performance profiles (Full, Lite, Performance)" >> release-notes.md
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-files/*
          body_path: release-notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notify Build Status
    needs: [build]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Report build status
        run: |
          echo "=== Vibe-Linux ISO Build Status ==="
          echo ""
          
          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "✅ SUCCESS: ISO builds completed successfully!"
            echo ""
            echo "Built artifacts:"
            echo "  - x86_64 ISO (for Intel/AMD systems)"
            echo "  - aarch64 ISO (for Apple Silicon/ARM64 systems)"
            echo ""
            echo "Check the 'Artifacts' section for download links."
            echo "Next: Create a release tag (v0.2.1) to publish to GitHub Releases"
          elif [ "${{ needs.build.result }}" = "failure" ]; then
            echo "❌ FAILED: ISO builds did not complete successfully"
            echo ""
            echo "Please check the build logs above for error details."
            echo ""
            echo "Common issues:"
            echo "  - mkarchiso not found in PATH"
            echo "  - Insufficient disk space"
            echo "  - Missing dependencies (archiso, rsync, etc.)"
            echo "  - Permission issues in container"
          else
            echo "⚠️  SKIPPED: Build job was skipped or cancelled"
          fi
          
          echo ""
          echo "Build Details:"
          echo "  Repository: Coderofpears/vibe-linux"
          echo "  Commit: ${{ github.sha }}"
          echo "  Branch/Tag: ${{ github.ref }}"
