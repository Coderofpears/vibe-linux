name: Code Quality & Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint mypy
      
      - name: Lint Python files
        run: |
          pylint --disable=all --enable=E,F tools installer examples/plugins || true
      
      - name: Type check with mypy
        run: |
          mypy tools installer examples/plugins --ignore-missing-imports || true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Compile Python files
        run: |
          python -m py_compile tools/vibectl/vibectl.py
          python -m py_compile tools/vibe-plugin-runtime/vibe-plugin-runtime.py
          python -m py_compile installer/vibe-installer.py
          python -m py_compile examples/plugins/system-info/plugin.py
          python -m py_compile examples/plugins/package-search/plugin.py
          python -m py_compile examples/plugins/vibe-copilot/plugin.py
      
      - name: Validate JSON configurations
        run: |
          python -m json.tool configs/modes/full.json > /dev/null
          python -m json.tool configs/modes/lite.json > /dev/null
          python -m json.tool configs/modes/performance.json > /dev/null
          python -m json.tool configs/modes/windows11.json > /dev/null
          python -m json.tool configs/modes/macos.json > /dev/null
          python -m json.tool configs/vibe/locale/en-US.json > /dev/null
          python -m json.tool configs/vibe/style.json > /dev/null
      
      - name: Validate shell scripts
        run: |
          bash -n scripts/build-iso.sh
          bash -n scripts/build-iso-arch.sh
          bash -n scripts/build-all-iso.sh
          bash -n scripts/smoke-test.sh
      
      - name: Run smoke tests
        run: |
          bash scripts/smoke-test.sh

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
